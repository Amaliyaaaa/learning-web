<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Лабораторная работа 8. Задание 2</title>
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    background-color: #1e1e1e;
    color: #f5f5f5;
    display: flex;
    justify-content: center;
    padding: 20px;
}
.container {
    width: 100%;
    max-width: 1200px;
}
h1 {
    text-align: center;
    color: #ff3d3d;
    margin-bottom: 20px;
}
.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}
.tab {
    flex: 1;
    padding: 12px;
    background-color: #2a2a2a;
    border: 2px solid #b71c1c;
    border-radius: 5px 5px 0 0;
    cursor: pointer;
    font-size: 16px;
    text-align: center;
    color: #fff;
    transition: 0.3s;
}
.tab.active {
    background-color: #b71c1c;
    color: #fff;
}
.tab-content {
    display: none;
}
.tab-content.active {
    display: block;
}
.group-item, .stadium-item {
    margin-bottom: 20px;
    padding: 20px;
    background-color: #2a2a2a;
    border-radius: 8px;
    border-left: 5px solid #ff5252;
}
.group-item h2, .stadium-item h2 {
    color: #ff8a65;
}
.match-item {
    padding: 10px;
    margin: 5px 0;
    background-color: #1e1e1e;
    border-radius: 5px;
    border-left: 3px solid #b71c1c;
}
.match-item strong {
    color: #ff3d3d;
}
.loading {
    text-align: center;
    padding: 20px;
    color: #ff8a65;
}
</style>
</head>
<body>
<div class="container">
    <h1>Лабораторная работа 8. Задание 2
    </h1>
    <div class="tabs">
        <button class="tab active" onclick="showTab('groups', event)">Группы</button>
        <button class="tab" onclick="showTab('stadiums', event)">Стадионы</button>
    </div>

    <div id="groups" class="tab-content active">
        <div class="loading">Загрузка данных о группах...</div>
    </div>

    <div id="stadiums" class="tab-content">
        <div class="loading">Загрузка данных о стадионах...</div>
    </div>
</div>

<script>
function showTab(tabName, event) {
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(tabName).classList.add('active');
}

async function loadData(url, containerId, renderFn) {
    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const data = await response.json();
        const container = document.getElementById(containerId);
        container.innerHTML = (!data || Object.keys(data).length === 0)
            ? '<p>Данные не найдены. Убедитесь, что файл cup.txt загружен в папку data/lab8/task2/</p>'
            : renderFn(data);
    } catch (error) {
        document.getElementById(containerId).innerHTML = `<p>Ошибка: ${error.message}</p>`;
    }
}

function loadGroups() {
    loadData('/api/lab8/task2/groups', 'groups', (groups) =>
        Object.values(groups).map(group => `
            <div class="group-item">
                <h2>Группа ${group.group}</h2>
                ${group.matches?.length ? group.matches.map(match => `
                    <div class="match-item">
                        <strong>${match.date} ${match.time}</strong><br>
                        ${match.team1} ${match.score1} - ${match.score2} ${match.team2}<br>
                        <em>${match.stadium}</em>
                    </div>
                `).join('') : '<p>Нет матчей</p>'}
            </div>
        `).join('')
    );
}

function loadStadiums() {
    loadData('/api/lab8/task2/stadiums', 'stadiums', (stadiums) =>
        Object.values(stadiums).map(stadium => `
            <div class="stadium-item">
                <h2>${stadium.stadium}</h2>
                ${stadium.matches?.length ? stadium.matches.map(match => `
                    <div class="match-item">
                        <strong>Группа ${match.group}</strong> - ${match.date} ${match.time}<br>
                        ${match.team1} ${match.score1} - ${match.score2} ${match.team2}
                    </div>
                `).join('') : '<p>Нет матчей</p>'}
            </div>
        `).join('')
    );
}

document.querySelector('.tab[onclick*="stadiums"]').addEventListener('click', () => {
    if (document.getElementById('stadiums').innerHTML.includes('Загрузка')) {
        loadStadiums();
    }
});

loadGroups();
</script>
</body>
</html>
